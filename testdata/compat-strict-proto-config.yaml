# Minimal config exercising the v0.2.2 + v0.2.3 strict-proto-config fixes:
# `step.audit.poll_anchor_confirmation` and `step.audit.public_receipt` both
# supply parameters via the YAML `config:` block. Pre-v0.2.2 the plugin
# declared `google.protobuf.Empty` as ConfigMessage, so wfctl + the engine
# rejected any key in `config:` under STRICT_PROTO. v0.2.2 advertised typed
# Config messages but `sequence` was `int64` and `proof_data` was `bytes`,
# both of which strict-proto rejects when BMW templates render as raw
# strings. v0.2.3 changed `sequence` and `proof_data` to `string` so the
# templated values pass strict-proto validation; the handler parses sequence
# to int64 internally and treats proof_data as opaque raw bytes.

name: audit-chain-strict-proto-config-compat

modules:
  - name: bmw-financial
    type: audit.ledger
    config:
      name: bmw-financial
      description: BMW financial ledger
      anchor_providers: ["opentimestamps"]
      anchor_schedule: "@hourly"
      anchor_min_entries: 1
      dsn: postgres://user:pass@localhost:5432/audit?sslmode=disable

  - name: opentimestamps
    type: audit.anchor_provider.opentimestamps
    config:
      calendar_servers: ["https://alice.btc.calendar.opentimestamps.org"]
      http_timeout_ms: 30000

workflows:
  pipelines:
    pipelines:
      poll-anchor-confirmations:
        # Exercises step.audit.poll_anchor_confirmation with every field BMW
        # supplies. proof_data is a raw string (v0.2.3 field kind = string,
        # matching BMW's `"{{ .item.proof_data }}"` templated value).
        trigger:
          type: trigger.http
          config:
            method: POST
            path: /audit/poll
        steps:
          - name: poll
            type: step.audit.poll_anchor_confirmation
            config:
              anchor_id: "1"
              provider: opentimestamps
              external_id: abc123
              proof_data: "raw-proof-bytes"
              ledger: bmw-financial

      build-public-receipt:
        # Exercises step.audit.public_receipt with every field BMW supplies.
        # sequence is a raw string (v0.2.3 field kind = string, matching
        # BMW's `"{{ .item.audit_sequence }}"` templated value).
        trigger:
          type: trigger.http
          config:
            method: GET
            path: /audit/receipt
        steps:
          - name: get_receipt
            type: step.audit.public_receipt
            config:
              ledger: bmw-financial
              sequence: "1"
              redact_fields:
                - contributor_user_id
